{{ define "main" }}
<section class="legal-section" style="padding: 10rem 0 5rem;">
  <div class="container" style="max-width: 850px; margin: 0 auto; padding: 0 2rem;">
    <h1 style="font-weight: 300; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2.5rem; font-size: clamp(1.8rem, 3vw, 2.3rem); color: var(--noir);">{{ .Title }}</h1>
    <div class="legal-text-block" style="line-height: 1.8; color: var(--gris-texte); font-size: 0.95rem;">
      {{ .Content }}
    </div>
  </div>
</section>

<style>
  .legal-text-block p { 
    margin-bottom: 1.5rem; 
    text-align: justify; 
    max-width: 100%; 
  }
  .legal-text-block h2 { 
    font-size: 1.2rem; 
    margin: 3rem 0 1rem; 
    font-weight: 500; 
    text-transform: uppercase; 
    letter-spacing: 0.05em; 
    color: var(--noir); 
    border-bottom: 1px solid rgba(0,0,0,0.06);
    padding-bottom: 0.5rem;
  }
</style>
{{ end }}
