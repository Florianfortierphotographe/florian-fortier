baseURL = "https://855c2852.florian-fortier.pages.dev"
defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
title = "Florian Fortier - Photographe d'architecture et immobilier"

[permalinks]
  portfolio = "/:slug/"
  post = "/post/:slug/"

[params]
  description = "Photographe d'architecture, immobilier et retail basé en région parisienne. Intervient à Paris, en Île-de-France et dans toute la France."
  email = "contact@florianfortier.com"
  phone = "06.18.26.72.40"
  instagram = "https://www.instagram.com/florianfortier"
  author = "Florian Fortier"
  locale_fr = "fr_FR"
  locale_en = "en_GB"
[languages]
  [languages.fr]
    languageName = "Français"
    weight = 1
    contentDir = "content/fr"
    title = "Florian Fortier - Photographe d'architecture et immobilier"
    [languages.fr.params]
      description = "Photographe d'architecture, immobilier et retail à Paris et en Île-de-France. Reportages professionnels pour architectes, promoteurs et enseignes."

  [languages.en]
    languageName = "English"
    weight = 2
    contentDir = "content/en"
    title = "Florian Fortier - Architecture & Real Estate Photographer"
    [languages.en.params]
      description = "Architecture, retail and real estate photographer based in Paris. Professional photography for architects, developers and brands across Europe."
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

